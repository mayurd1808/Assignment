services:
  - type: web
    name: round-2-auth-website
    env: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 22.15.1
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/app.sqlite
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
